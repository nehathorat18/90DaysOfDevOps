services:

  web:
    build: .
    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - db
      - redis

  db:
    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis-cache

    restart: always

volumes:
  postgres_data:
